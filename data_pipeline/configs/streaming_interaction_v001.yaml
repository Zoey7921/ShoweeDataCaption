version: streaming_interaction_v001

# Any JSON list whose samples contain metadata.temporal_segments can be used here.
# temporal_caption_v001 is only the current example source.
input:
  dataset: data/processed/temporal_caption_v001.json
  format: temporal_segments

turns:
  points: segment_midpoints
  max_turns_per_sample: 3
  include_history: true
  min_gap_sec: 1.0

outputs:
  processed_dir: data/processed
  review_dir: eval/human_review
  run_dir: runs/streaming_interaction_v001

review_status: streaming_unreviewed

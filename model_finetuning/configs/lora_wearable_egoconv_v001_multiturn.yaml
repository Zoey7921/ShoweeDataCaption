model: /data1/shared_data/qwen3vl-showeeData/models/base/Qwen3-VL-8B-Instruct
train_data: /data1/shared_data/qwen3vl-showeeData/data/processed/wearable_egoconv_v001_multiturn_train.json
output_dir: /data1/shared_data/qwen3vl-showeeData/models/lora/wearable_egoconv_v001_multiturn_lora
run_dir: /data1/shared_data/qwen3vl-showeeData/runs/puzuo/wearable_egoconv_v001_multiturn_lora

num_frames: 8
max_steps: 200
epochs: 2
learning_rate: 0.00005
weight_decay: 0.0
gradient_accumulation_steps: 4
max_grad_norm: 1.0
log_every: 1
save_every: 100

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

seed: 42
use_gradient_checkpointing: true

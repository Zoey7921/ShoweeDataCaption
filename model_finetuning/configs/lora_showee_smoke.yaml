model: /data1/shared_data/qwen3vl-showeeData/models/base/Qwen3-VL-8B-Instruct
train_data: /data1/shared_data/qwen3vl-showeeData/data/processed/smoke_train.json
output_dir: /data1/shared_data/qwen3vl-showeeData/models/lora/showee_smoke_lora_v001
run_dir: /data1/shared_data/qwen3vl-showeeData/runs/puzuo/showee_smoke_lora_v001

num_frames: 4
max_steps: 20
epochs: 20
learning_rate: 0.0001
weight_decay: 0.0
gradient_accumulation_steps: 1
max_grad_norm: 1.0
log_every: 1
save_every: 10

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

seed: 42
use_gradient_checkpointing: true
